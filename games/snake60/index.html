<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSnake: Neon Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <div class="snake-layout">
    <div class="snake-topbar">
      <div class="top-actions" aria-label="Page actions">
        <a class="top-action-button" href="./">LOBBY</a>
      </div>
      <div id="hud">
        <div class="hud-left">
          <div class="score-box">TIME: <span id="time-left">60</span>s</div>
          <div class="score-box">SCORE: <span id="current-score">0</span></div>
        </div>
        <div class="hud-right">
          <div id="mode-banner" class="score-box hidden"></div>
          <div class="score-box">HIGH: <span id="high-score">0</span></div>
          <button id="replay-exit" class="score-box hud-button hidden" type="button">EXIT REPLAY</button>
        </div>
      </div>
    </div>

    <div id="game-container">
      <div class="crt-overlay"></div>
      <canvas id="gameCanvas" width="800" height="600"></canvas>
      <div id="ui-layer" class="overlay-screen active">
        <div id="title-screen" class="screen active">
          <img
            src=""
            data-thumbnail-path="static/assets/thumbnails/snake60.png"
            class="game-title-thumbnail"
            alt="Snake60 Thumbnail"
          >
          <div class="top-score-display">
            <span class="label">NETWORK HIGH SCORE</span>
            <strong class="score-value" id="network-high-score-value">---</strong>
            <span class="score-name" id="network-high-score-name">---</span>
          </div>
          <h1 class="glitch" data-text="WebSnake">WebSnake</h1>
          <p class="subtitle">NEON EDITION</p>
          <div id="leaderboard" class="leaderboard-container">
            <h3>TOP 10 SYSTEMS</h3>
            <div class="leaderboard-header">
              <span>RANK</span><span>NAME</span><span>SCORE</span><span>MESSAGE</span><span>ACT</span>
            </div>
            <ul id="leaderboard-list"><li>Loading...</li></ul>
          </div>
          <div class="start-prompt blink">PRESS [SPACE] TO START</div>
          <button id="play-button" class="neon-button play-button" type="button">PLAY</button>
          <div class="platform-switcher">
            <a href="#" id="platform-switch-link" class="switch-link">---</a>
          </div>
        </div>

        <div id="gameover-screen" class="screen hidden">
          <h2 id="gameover-title" class="game-over-text">SYSTEM FAILURE</h2>
          <div class="final-scorebox">SCORE: <span id="final-score">0</span></div>
          <div id="highscore-entry" class="highscore-form hidden">
            <h3>NEW HIGH SCORE!</h3>
            <div class="input-group">
              <label for="hs-name">NAME</label>
              <input type="text" id="hs-name" maxlength="12" placeholder="Player name" autocomplete="off">
            </div>
            <div class="input-group">
              <label for="hs-message">COMMENT</label>
              <input type="text" id="hs-message" maxlength="20" placeholder="Short comment" autocomplete="off">
            </div>
            <button id="hs-submit" class="neon-button">SUBMIT TO NETWORK</button>
            <div class="skip-hint">Press ESC to skip</div>
          </div>
          <div id="restart-prompt" class="start-prompt blink">PRESS [SPACE] TO REBOOT</div>
          <button id="touch-restart-button" class="neon-button touch-only hidden" type="button">PLAY AGAIN</button>
        </div>
      </div>
    </div>

    <div id="mobile-controls" class="mobile-controls hidden" aria-label="Touch controls">
      <button type="button" class="touch-button touch-turn-button" data-touch-turn="left">LEFT</button>
      <button type="button" class="touch-button touch-turn-button" data-touch-turn="right">RIGHT</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
