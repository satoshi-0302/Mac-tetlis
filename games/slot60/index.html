<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Antigravity Slots</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script>
        (() => {
            const mode = new URLSearchParams(window.location.search).get('mode');
            const coarse = typeof window.matchMedia === 'function' && window.matchMedia('(pointer: coarse)').matches;
            const routeMode = mode === 'mobile' || (mode !== 'desktop' && coarse) ? 'mobile' : 'desktop';
            document.body.dataset.routeMode = routeMode;
        })();
    </script>
    <div class="slot-shell">
        <header class="slot-topbar">
            <a class="slot-nav-button" href="/">LOBBY</a>
            <span class="slot-route-pill" id="route-pill">DESKTOP</span>
        </header>
        <div id="game-container">
            <canvas id="game-canvas"></canvas>
            
            <div id="title-screen" class="active">
                <img src="/static/assets/thumbnails/slot60.png" class="game-title-thumbnail" alt="Slot60 Thumbnail">
                
                <div class="top-score-display">
                    <span class="label">NETWORK HIGH SCORE</span>
                    <strong class="score-value" id="net-high-score-value">---</strong>
                    <span class="score-name" id="net-high-score-name">---</span>
                </div>

                <button class="play-button" id="play-button">PLAY</button>

                <div class="platform-switcher">
                    <a href="#" id="platform-switch-link" class="switch-link">---</a>
                </div>
            </div>
        </div>
        <p class="slot-mobile-hint">タップでスタート・停止。60秒でどこまで伸ばせるかの勝負です。</p>
    </div>
    <script src="js/script.js"></script>
</body>

</html>
