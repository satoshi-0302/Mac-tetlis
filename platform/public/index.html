<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Arcade Lobby</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <p class="eyebrow">Shared Web Arcade</p>
        <h1>Game Lobby</h1>
        <p class="lead">
          共通のロビーから 3 本のゲームへ入れます。ランキングはゲームごと、AI は目標スコアとして同じ表に並びます。
        </p>
      </header>

      <main>
        <section class="card-grid" id="gameGrid" aria-live="polite">
          <article class="game-card loading-card">
            <p>ゲーム一覧を読み込み中です。</p>
          </article>
        </section>
      </main>
    </div>

    <script type="module" src="/static/lobby.js"></script>
  </body>
</html>
